<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connor Wardell</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f0f0f;
      color: #e0e0e0;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #ffffff;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: #a0a0a0;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 500;
      color: #ffffff;
      background-color: #2a6ef0;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      transition: background-color 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #1b5ad4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Connor Wardell's Website</h1>
    <p>Visit Dacite.dev to see the various projects I've developed and am currently working on.</p>
    <a href="https://dacite.dev" class="btn">Go to Dacite.dev</a>
  </div>
</body>
</html>
